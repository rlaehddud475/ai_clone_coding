<!DOCTYPE html>
<html xmlns:th="http://www.thylmleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{front/layouts/main}">
<main layout:fragment="content">
    <h1 th:text="#{회원가입}"></h1>
    <form name="frmJoin" method="POST" th:action="@{/member/join}" autocomplete="off" th:object="${requestJoin}" >
        <div class="row">
        <input type="text" name="email" th:field="*{email}" th:placeholder="#{이메일을 입력해주세요}">
        <div class="error" th:each="err : ${#fields.errors('email')}" th:text="${err}"></div>
    </div>
        <div class="row">
            <input type="text" name="name" th:field="*{name}" th:placeholder="#{회원명을 입력해주세요}">
            <div class="error" th:each="err : ${#fields.errors('name')}" th:text="${err}"></div>
        </div>
        <div class="row">
            <input type="password" name="password" th:field="*{password}" th:placeholder="#{비밀번호를 입력해주세요}">
            <div class="error" th:each="err : ${#fields.errors('password')}" th:text="${err}"></div>
        </div>
        <div class="row">
            <input type="password" name="confirmPassword" th:field="*{confirmPassword}" th:placeholder="#{위에 입력한 비밀번호와 입력한 비밀번호를 입력해주세요}">
            <div class="error" th:each="err : ${#fields.errors('confirmPassword')}" th:text="${err}"></div>
        </div>
        <div class="row">
            <input type="password" name="nickName" th:field="*{nickName}" th:placeholder="#{닉네임을  입력해주세요}">
            <div class="error" th:each="err : ${#fields.errors('nickName')}" th:text="${err}"></div>
        </div>
        <button type="submit" th:text="#{가입하기}"></button>
        <div class="error global" th:each="err : ${#fields.globalErrors}" th:text="${err}"></div>

    </form>
</main>
</html>
