<!DOCTYPE html>
<html xmlns:th="http://www.thylmleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, user-scalble=yes, maximum-scale=2.0, minimum-scale=0.5, initial-scale=1.0">
        <meta name="keywords" th:if="${keywords != null}" th:content="${keywords}">
        <meta name="description" th:if="${description != null}" th:content="${description}">
        <title  th:if="${pageTitle !=null}" th:text="${pageTitle}"></title>
        <link rel="stylesheet" type="text/css" th:htef="@{/common/css/style.css}">

        <th:block th:if="${addCommonCss!=null}">
            <link rel="stylesheet" type="text/css" th:each="cssPath : ${addCommonCss}" th:htef="@{/common/css/{path}.css(path=${cssPath})}">
        </th:block>

        <link rel="stylesheet" type="text/css" th:htef="@{/mobile/css/style.css}">
        <th:block th:if="${addCss!=null}">
            <link rel="stylesheet" type="text/css" th:each="cssPath : ${addCss}" th:htef="@{/mobile/css/{path}.css(path=${cssPath})}">
        </th:block>
        <script th:src="@{/mobile/js/common.js}" defer></script>
        <th:block th:if="${addCommonScript!=null}">
            <script th:each="jsPath : ${addCommonScript}" th:src="@{/common/js/{path}.js(path=${jsPath})}"></script>
        </th:block>
        <script th:src="@{/mobile/js/common.js}" defer></script>
        <th:block th:if="${addScript!=null}">
            <script th:each="jsPath : ${addScript}" th:src="@{/mobile/js/{path}.js(path=${jsPath})}"></script>
        </th:block>
    </head>
    <body>
    <header th:replace="~{mobile/outlines/_header::common}"></header>
    <main layout:fragment="content"></main>
    <footer th:replace="~{mobile/outlines/_footer::common}"></footer>
    </body>
</html>
